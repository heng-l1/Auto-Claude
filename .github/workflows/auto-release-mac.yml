name: Auto Release macOS

on:
  push:
    branches: [main]

concurrency:
  group: auto-release-mac
  cancel-in-progress: false

jobs:
  build-and-release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Bump patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./apps/frontend/package.json').version")
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "New version: $NEW_VERSION"

          # Update apps/frontend/package.json
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('apps/frontend/package.json', 'utf8'));
            p.version = '${NEW_VERSION}';
            fs.writeFileSync('apps/frontend/package.json', JSON.stringify(p, null, 2) + '\n');
          "

          # Update root package.json
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = '${NEW_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

          # Update apps/backend/__init__.py
          sed -i '' "s/__version__ = \".*\"/__version__ = \"${NEW_VERSION}\"/" apps/backend/__init__.py

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/frontend/package.json package.json apps/backend/__init__.py
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin main --follow-tags

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Link node_modules for electron-builder
        run: |
          if [ -e "apps/frontend/node_modules" ] || [ -L "apps/frontend/node_modules" ]; then
            rm -rf "apps/frontend/node_modules"
          fi
          ln -s ../../node_modules apps/frontend/node_modules

      - name: Cache pip wheel cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-wheel-${{ runner.os }}-arm64-${{ hashFiles('apps/backend/requirements.txt') }}
          restore-keys: pip-wheel-${{ runner.os }}-arm64-

      - name: Cache bundled Python
        uses: actions/cache@v4
        with:
          path: apps/frontend/python-runtime
          key: python-bundle-${{ runner.os }}-arm64-3.12.8-${{ hashFiles('apps/backend/requirements.txt') }}
          restore-keys: python-bundle-${{ runner.os }}-arm64-3.12.8-

      - name: Package macOS (Apple Silicon)
        run: cd apps/frontend && npm run package:mac -- --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            apps/frontend/dist/*.dmg
            apps/frontend/dist/*.zip
            apps/frontend/dist/*.yml
            apps/frontend/dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
